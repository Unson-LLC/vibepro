name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 20
          - 22
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      # Node < 22.6 cannot type-strip .ts, so `npm test` silently skips
      # test/e2e/*.spec.ts there. This step runs those specs explicitly as
      # the required gate on Node 22+, and prints a counted skip annotation
      # on lanes that cannot execute them.
      - run: npm run test:e2e:ts
      - run: npm run pack:dry-run
      - run: node bin/vibepro.js --version
      - run: node bin/vibepro.js help --language en
      - run: node bin/vibepro.js check self-dogfood . --run-id ci-self-dogfood --json
      - run: node bin/vibepro.js checkpoint --json
