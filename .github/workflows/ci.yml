name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 20
          - 22
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run pack:dry-run
      - run: node bin/vibepro.js --version
      - run: node bin/vibepro.js help --language en
      - run: node bin/vibepro.js check self-dogfood . --run-id ci-self-dogfood --json
      - run: node bin/vibepro.js checkpoint --json
