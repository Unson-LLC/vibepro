<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">VibePro as repository control plane</title>
  <desc id="desc">A product repository connected to VibePro workspace, story, diagnosis, PR preparation, and Brainbase.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2 L12 7 L2 12 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#f8fafc"/>
  <rect x="54" y="52" width="1092" height="576" rx="28" fill="url(#panel)" stroke="#cbd5e1"/>

  <g filter="url(#shadow)">
    <rect x="96" y="166" width="300" height="270" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="450" y="126" width="300" height="350" rx="24" fill="#111827"/>
    <rect x="804" y="166" width="300" height="270" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <text x="246" y="206" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">対象リポジトリ</text>
  <text x="246" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">SalesTailor など</text>
  <g font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">
    <text x="132" y="304">・ソースコード</text>
    <text x="132" y="340">・Story / ADR</text>
    <text x="132" y="376">・テスト</text>
    <text x="132" y="412">・Git 差分</text>
  </g>

  <text x="600" y="176" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">VibePro</text>
  <text x="600" y="214" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#c7d2fe">リポジトリ内の制御基盤</text>
  <g font-family="Inter, Arial, sans-serif" font-size="17" fill="#e5e7eb">
    <rect x="494" y="248" width="212" height="42" rx="10" fill="#4338ca"/>
    <text x="600" y="275" text-anchor="middle">.vibepro 管理</text>
    <rect x="494" y="310" width="212" height="42" rx="10" fill="#0f766e"/>
    <text x="600" y="337" text-anchor="middle">診断と証跡</text>
    <rect x="494" y="372" width="212" height="42" rx="10" fill="#be123c"/>
    <text x="600" y="399" text-anchor="middle">PR準備</text>
  </g>

  <text x="954" y="206" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Brainbase / NocoDB</text>
  <text x="954" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">組織の正本と集約</text>
  <g font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">
    <text x="840" y="304">・バグ / Story</text>
    <text x="840" y="340">・進捗状態</text>
    <text x="840" y="376">・PR URL</text>
    <text x="840" y="412">・学習の蓄積</text>
  </g>

  <line x1="402" y1="302" x2="440" y2="302" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="760" y1="302" x2="798" y2="302" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="798" y1="380" x2="760" y2="380" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="440" y1="380" x2="402" y2="380" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="600" y="565" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">「AIで直した」を「組織で引き継げる」に変える</text>
</svg>
