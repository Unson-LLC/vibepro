<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">VibePro PR prepare output</title>
  <desc id="desc">A pull request body with background, decision, changes, acceptance criteria, verification, and review points.</desc>
  <rect width="1200" height="680" fill="#ffffff"/>
  <rect x="78" y="58" width="1044" height="564" rx="28" fill="#f8fafc" stroke="#cbd5e1"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="116" y="116" font-size="34" font-weight="800" fill="#111827">PR本文が引き継ぎになる</text>
    <text x="116" y="150" font-size="18" fill="#475569">SalesTailor BUG-159で出た情報</text>
  </g>

  <g transform="translate(116 196)" font-family="Inter, Arial, sans-serif">
    <rect width="440" height="330" rx="18" fill="#111827"/>
    <text x="28" y="46" font-size="20" font-weight="800" fill="#ffffff">VibePro が抽出</text>
    <text x="28" y="88" font-size="17" fill="#d1d5db">・NocoDB BUG URL</text>
    <text x="28" y="126" font-size="17" fill="#d1d5db">・背景と発生条件</text>
    <text x="28" y="164" font-size="17" fill="#d1d5db">・ADR不要理由</text>
    <text x="28" y="202" font-size="17" fill="#d1d5db">・受け入れ基準</text>
    <text x="28" y="240" font-size="17" fill="#d1d5db">・対象テストコマンド</text>
    <text x="28" y="278" font-size="17" fill="#d1d5db">・レビュー観点</text>
  </g>

  <g transform="translate(620 196)" font-family="Inter, Arial, sans-serif">
    <rect width="430" height="330" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="28" y="46" font-size="20" font-weight="800" fill="#0f172a">PR Body</text>
    <rect x="28" y="68" width="374" height="34" rx="8" fill="#dbeafe"/>
    <text x="44" y="91" font-size="15" fill="#1e3a8a">背景・要求</text>
    <rect x="28" y="114" width="374" height="34" rx="8" fill="#dcfce7"/>
    <text x="44" y="137" font-size="15" fill="#14532d">実装判断</text>
    <rect x="28" y="160" width="374" height="34" rx="8" fill="#fef3c7"/>
    <text x="44" y="183" font-size="15" fill="#78350f">変更内容</text>
    <rect x="28" y="206" width="374" height="34" rx="8" fill="#ede9fe"/>
    <text x="44" y="229" font-size="15" fill="#4c1d95">検証</text>
    <rect x="28" y="252" width="374" height="34" rx="8" fill="#ffe4e6"/>
    <text x="44" y="275" font-size="15" fill="#881337">リスク・確認事項</text>
  </g>

  <text x="600" y="584" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#111827">レビュー前に「なぜ・何を・どう確かめたか」が揃う</text>
</svg>
