<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">VibePro story driven development flow</title>
  <desc id="desc">Signal, Story, Architecture, Code, Test, PR, Sync flow.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2 L12 7 L2 12 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#ffffff"/>
  <rect x="60" y="70" width="1080" height="540" rx="28" fill="#f8fafc" stroke="#cbd5e1"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="600" y="122" text-anchor="middle" font-size="34" font-weight="800" fill="#111827">Story 駆動の開発経路</text>
    <text x="600" y="156" text-anchor="middle" font-size="18" fill="#475569">作業をその場の判断で終わらせず、証跡と次の判断へ接続する</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(95 250)">
      <rect width="132" height="92" rx="16" fill="#fee2e2" stroke="#fecaca"/>
      <text x="66" y="39" font-size="22" font-weight="800" fill="#991b1b">Signal</text>
      <text x="66" y="66" font-size="14" fill="#7f1d1d">バグ・要望</text>
    </g>
    <g transform="translate(258 250)">
      <rect width="132" height="92" rx="16" fill="#ffedd5" stroke="#fed7aa"/>
      <text x="66" y="39" font-size="22" font-weight="800" fill="#9a3412">Story</text>
      <text x="66" y="66" font-size="14" fill="#7c2d12">誰が何をなぜ</text>
    </g>
    <g transform="translate(421 250)">
      <rect width="132" height="92" rx="16" fill="#ecfccb" stroke="#d9f99d"/>
      <text x="66" y="39" font-size="22" font-weight="800" fill="#3f6212">Arch</text>
      <text x="66" y="66" font-size="14" fill="#365314">境界と責務</text>
    </g>
    <g transform="translate(584 250)">
      <rect width="132" height="92" rx="16" fill="#dbeafe" stroke="#bfdbfe"/>
      <text x="66" y="39" font-size="22" font-weight="800" fill="#1e40af">Code</text>
      <text x="66" y="66" font-size="14" fill="#1e3a8a">TDDで実装</text>
    </g>
    <g transform="translate(747 250)">
      <rect width="132" height="92" rx="16" fill="#ede9fe" stroke="#ddd6fe"/>
      <text x="66" y="39" font-size="22" font-weight="800" fill="#5b21b6">Test</text>
      <text x="66" y="66" font-size="14" fill="#4c1d95">検証固定</text>
    </g>
    <g transform="translate(910 250)">
      <rect width="132" height="92" rx="16" fill="#fce7f3" stroke="#fbcfe8"/>
      <text x="66" y="39" font-size="22" font-weight="800" fill="#9d174d">PR</text>
      <text x="66" y="66" font-size="14" fill="#831843">引き継ぎ</text>
    </g>
  </g>

  <g stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)">
    <line x1="230" y1="296" x2="252" y2="296"/>
    <line x1="393" y1="296" x2="415" y2="296"/>
    <line x1="556" y1="296" x2="578" y2="296"/>
    <line x1="719" y1="296" x2="741" y2="296"/>
    <line x1="882" y1="296" x2="904" y2="296"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="190" y="420" width="820" height="96" rx="18" fill="#111827"/>
    <text x="600" y="462" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">VibePro が残すもの</text>
    <text x="600" y="496" text-anchor="middle" font-size="18" fill="#d1d5db">背景・判断・差分・検証・リスク・次コマンド</text>
  </g>
</svg>
